<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molly Ryan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #dbeafe, #fce7f3);
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 3rem;
            color: #1f2937;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #6b7280;
        }

        .underline {
            width: 80px;
            height: 4px;
            background: #6366f1;
            margin: 15px auto 25px;
            border-radius: 2px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 1rem;
            color: white;
            background: #6366f1;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Molly Ryan</h1>
        <div class="underline"></div>
        <p>Welcome to my personal webpage ✨</p>
        <a href="#" class="btn">Learn More</a>
    </div>
</body>
</html>
